name: Build & deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy)
        run: npm run build

      # Point the CMS at THIS repo automatically — no code edits needed.
      - name: Write CMS repo config
        run: |
          mkdir -p _site/admin
          cat > _site/admin/repo.json <<JSON
          {
            "owner": "${GITHUB_REPOSITORY%%/*}",
            "repo": "${GITHUB_REPOSITORY##*/}",
            "branch": "${GITHUB_REF_NAME}"
          }
          JSON

      - name: Write OAuth proxy config (from repo secrets)
        env:
          CID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          CSECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p _site/oauth
          cat > _site/oauth/oauth-config.php <<PHP
          <?php
          return [
              'client_id'     => '${CID}',
              'client_secret' => '${CSECRET}',
              'scope'         => 'repo',
          ];
          PHP

      # FTP target comes from repo Variables (Settings → Secrets and variables →
      # Actions → Variables): FTP_SERVER, FTP_USERNAME. Password is a Secret.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: /
          # clean-slate OFF so server-only files (smtp-config.php, phpmailer/,
          # oauth/oauth-config.php) are preserved across deploys.
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
